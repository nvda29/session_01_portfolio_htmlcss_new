<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About + Skills</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ABOUT SECTION -->
    <section class="about">
        <div class="container about-container">

            <div class="about-image">
                <img src="https://via.placeholder.com/400" alt="Profile Image">
            </div>

            <div class="about-text">
                <h2>About Me</h2>

                <p>
                    I am a passionate front-end developer who loves
                    creating modern and responsive websites.
                </p>

                <p>
                    I enjoy learning new technologies and improving
                    my skills every day.
                </p>

                <p>
                    My goal is to become a professional full-stack developer.
                </p>
            </div>

        </div>
    </section>

    <!-- SKILLS SECTION -->
    <section class="skills">
        <div class="container">

            <h2>My Skills</h2>

            <div class="skill">
                <p>HTML</p>
                <div class="progress">
                    <div class="progress-bar html"></div>
                </div>
            </div>

            <div class="skill">
                <p>CSS</p>
                <div class="progress">
                    <div class="progress-bar css"></div>
                </div>
            </div>

            <div class="skill">
                <p>JavaScript</p>
                <div class="progress">
                    <div class="progress-bar js"></div>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
