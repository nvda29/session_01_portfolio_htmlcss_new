<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Gallery</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="portfolio">
        <div class="container">

            <h2>My Portfolio</h2>

            <div class="portfolio-grid">

                <a href="#img1" class="portfolio-item">
                    <img src="https://picsum.photos/400/300" alt="Project 1">
                </a>

                <a href="#img2" class="portfolio-item">
                    <img src="https://picsum.photos/400/300?2" alt="Project 2">
                </a>

                <a href="#img3" class="portfolio-item">
                    <img src="https://picsum.photos/400/300?3" alt="Project 3">
                </a>

                <a href="#img4" class="portfolio-item">
                    <img src="https://picsum.photos/400/300?4" alt="Project 4">
                </a>

                <a href="#img5" class="portfolio-item">
                    <img src="https://picsum.photos/400/300?5" alt="Project 5">
                </a>

                <a href="#img6" class="portfolio-item">
                    <img src="https://picsum.photos/400/300?6" alt="Project 6">
                </a>

            </div>

        </div>
    </section>

    <!-- LIGHTBOX -->
    <div id="img1" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?1" alt="">
    </div>

    <div id="img2" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?2" alt="">
    </div>

    <div id="img3" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?3" alt="">
    </div>

    <div id="img4" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?4" alt="">
    </div>

    <div id="img5" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?5" alt="">
    </div>

    <div id="img6" class="lightbox">
        <a href="#" class="close">×</a>
        <img src="https://picsum.photos/800/600?6" alt="">
    </div>

</body>
</html>
